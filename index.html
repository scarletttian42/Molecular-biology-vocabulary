    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f7f9fc;
        }
        .control-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: opacity 0.2s;
        }
        button:hover {opacity:0.9}
        .mode-cn {background: #3b82f6; color: white;}
        .mode-en {background: #10b981; color: white;}
        .err-mode {background: #ef4444; color: white;}
        .add-err {background: #f97316; color: white;}
        .prev-btn {background: #9333ea; color: white;}
        .pass-btn {background: #222222; color: white;}
        .next-btn {background: #6366f1; color: white;}
        .check-btn {background: #f59e0b; color: white;}
        .clear-err {background: #6b7280; color: white;}
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 14px;
            box-shadow: 0 2px 14px #e2e8f0;
        }
        .question {
            font-size: 26px;
            margin-bottom: 26px;
            min-height: 90px;
            line-height: 1.5;
        }
        #userInput {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            margin-bottom: 18px;
        }
        .ans-tip {
            font-size: 17px;
            margin-top: 12px;
            display: none;
        }
        .right {color:#16a34a}
        .wrong {color:#dc2626}
        .stat {
            margin-top: 24px;
            color: #475569;
            line-height: 1.8;
        }
        .tip-add {
            margin-top:10px;
            color:#f97316;
        }
    </style>
</head>

    <div class="control-box">

        <button class="prev-btn" id="prevBtn">上一题</button>
        <button class="pass-btn" id="passBtn">过</button>
        <button class="next-btn" id="nextBtn">下一题</button>
        <button class="clear-err" id="clearErr">清空所有记录</button>
    </div>

    <div class="card">

        <div class="ans-tip" id="ansTip"></div>

let nowMode = null;
let currentWord = null;
let doneCount = 0;
let historyStack = []; // 历史题目栈，用于上一题

// 本地存储key
const KEY_ERR_LIST = "vocabErrList";
const KEY_PASS_LIST = "passWordList";
const KEY_CORRECT_COUNT = "wordCorrectCount";

// 读取错题
function getErrorWords() {
    const cache = localStorage.getItem(KEY_ERR_LIST);
    return cache ? JSON.parse(cache) : [];
}
function saveErrorWords(arr) {
    localStorage.setItem(KEY_ERR_LIST, JSON.stringify(arr));
}

// 读取被永久剔除的题目（过）
function getPassWords() {
    const cache = localStorage.getItem(KEY_PASS_LIST);
    return cache ? JSON.parse(cache) : [];
}
function savePassWords(arr) {
    localStorage.setItem(KEY_PASS_LIST, JSON.stringify(arr));
}

// 读取每道题答对次数
function getCorrectRecord() {
    const cache = localStorage.getItem(KEY_CORRECT_COUNT);
    return cache ? JSON.parse(cache) : {};
}
function saveCorrectRecord(obj) {
    localStorage.setItem(KEY_CORRECT_COUNT, JSON.stringify(obj));
}

// 更新统计数字
function refreshStat() {
    document.getElementById("errCount").innerText = getErrorWords().length;
    document.getElementById("doneCount").innerText = doneCount;

    const passArr = getPassWords();
    const correctRec = getCorrectRecord();
    const total = wordList.length;
    let finished = passArr.length;
    Object.values(correctRec).forEach(num=>{
        if(num >=2) finished++;
    })
    document.getElementById("remainCount").innerText = total - finished;

    // 判断全部刷题完成
    if(total - finished <= 0 && nowMode !== "err") {
        setTimeout(()=>alert("🎉 全部题目已完成！所有词条要么熟练答对2次，要么已标记‘过’，本次刷题结束！"), 300);
    }
}

// 获取过滤后的可用题库（剔除已过+答对2次以上）
function getAvailablePool() {
    const passArr = getPassWords();
    const correctRec = getCorrectRecord();
    return wordList.filter(item=>{
        const key = item.cn + "||" + item.en;
        const isPassed = passArr.some(p=>p.cn===item.cn && p.en===item.en);
        const isMastered = (correctRec[key] || 0) >= 2;
        return !isPassed && !isMastered;
    })
}

// 随机抽题
function getRandomWord(pool) {
    if(pool.length===0) return null;
    const idx = Math.floor(Math.random() * pool.length);
    return pool[idx];
}

// 刷新当前题目
function refreshQuestion() {
    const tipDom = document.getElementById("ansTip");
    const addTip = document.getElementById("addTip");
    tipDom.style.display = "none";
    addTip.innerText = "";
    document.getElementById("userInput").value = "";

    let pool;
    if(nowMode === "err") {
        pool = getErrorWords();
    } else {
        pool = getAvailablePool();
    }

    if(pool.length === 0) {
        document.getElementById("qText").innerText = "题库已空，全部完成！";
        currentWord = null;
        return;
    }

    currentWord = getRandomWord(pool);
    if(historyStack.length===0 || historyStack[historyStack.length-1] !== currentWord) {
        historyStack.push(currentWord);
    }

    if(nowMode === "cn") {
        document.getElementById("qText").innerText = `【中译英】请翻译：${currentWord.cn}`;
    } else if(nowMode === "en") {
        document.getElementById("qText").innerText = `【英译中】请翻译：${currentWord.en}`;
    } else if(nowMode === "err") {
        const oriMode = currentWord._mode;
        if(oriMode === "cn") {
            document.getElementById("qText").innerText = `【错题｜中译英】${currentWord.cn}`;
        } else {
            document.getElementById("qText").innerText = `【错题｜英译中】${currentWord.en}`;
        }
    }
}

// 上一题
document.getElementById("prevBtn").onclick = ()=>{
    if(historyStack.length < 2) return;
    historyStack.pop();
    currentWord = historyStack[historyStack.length-1];
    const tipDom = document.getElementById("ansTip");
    const addTip = document.getElementById("addTip");
    tipDom.style.display = "none";
    addTip.innerText = "";
    document.getElementById("userInput").value = "";

    if(nowMode === "cn") {
        document.getElementById("qText").innerText = `【中译英】请翻译：${currentWord.cn}`;
    } else if(nowMode === "en") {
        document.getElementById("qText").innerText = `【英译中】请翻译：${currentWord.en}`;
    } else if(nowMode === "err") {
        const oriMode = currentWord._mode;
        if(oriMode === "cn") {
            document.getElementById("qText").innerText = `【错题｜中译英】${currentWord.cn}`;
        } else {
            document.getElementById("qText").innerText = `【错题｜英译中】${currentWord.en}`;
        }
    }
}

// 过：永久剔除本题
document.getElementById("passBtn").onclick = ()=>{
    if(!currentWord || nowMode === "err") return;
    const passArr = getPassWords();
    const exist = passArr.some(p=>p.cn===currentWord.cn && p.en===currentWord.en);
    if(!exist) {
        passArr.push(currentWord);
        savePassWords(passArr);
    }
    refreshStat();
    refreshQuestion();
}

// 模式切换
document.getElementById("modeCn").onclick = () => {
    nowMode = "cn";
    doneCount = 0;
    historyStack = [];
    refreshStat();
    refreshQuestion();
}
document.getElementById("modeEn").onclick = () => {
    nowMode = "en";
    doneCount = 0;
    historyStack = [];
    refreshStat();
    refreshQuestion();
}
document.getElementById("errMode").onclick = () => {
    nowMode = "err";
    historyStack = [];
    refreshQuestion();
}

// 手动加入错题
document.getElementById("addErrBtn").onclick = () => {
    if(!currentWord || nowMode === "err") return;
    const addTip = document.getElementById("addTip");
    const oriMode = nowMode;
    let errList = getErrorWords();
    const exist = errList.some(item => item.cn === currentWord.cn && item.en === currentWord.en);
    if(exist) {
        addTip.innerText = "该题目已存在于错题本！";
    } else {
        errList.push({...currentWord, _mode: oriMode});
        saveErrorWords(errList);
        refreshStat();
        addTip.innerText = "✅ 已手动加入错题本";
    }
}

// 核对答案
document.getElementById("checkBtn").onclick = () => {
    if(!currentWord) return;
    const input = document.getElementById("userInput").value.trim();
    let rightAns, isCorrect;
    const oriMode = nowMode === "err" ? currentWord._mode : nowMode;

    if(oriMode === "cn") {
        rightAns = currentWord.en;
        isCorrect = input.toLowerCase() === rightAns.toLowerCase();
    } else {
        rightAns = currentWord.cn;
        isCorrect = input === rightAns;
    }

    const tipDom = document.getElementById("ansTip");
    tipDom.style.display = "block";
    if(isCorrect) {
        tipDom.className = "ans-tip right";
        tipDom.innerText = `回答正确！标准答案：${rightAns}`;

        // 普通模式：累计答对次数，≥2次自动剔除
        if(nowMode !== "err") {
            const rec = getCorrectRecord();
            const key = currentWord.cn + "||" + currentWord.en;
            rec[key] = (rec[key] || 0) + 1;
            saveCorrectRecord(rec);
        }
        // 错题模式答对直接移除
        if(nowMode === "err") {
            let errList = getErrorWords();
            errList = errList.filter(item => !(item.cn === currentWord.cn && item.en === currentWord.en));
            saveErrorWords(errList);
        }
    } else {
        tipDom.className = "ans-tip wrong";
        tipDom.innerText = `回答错误，标准答案：${rightAns}`;
    }
    refreshStat();
}

// 下一题
document.getElementById("nextBtn").onclick = () => {
    if(!nowMode) return;
    if(nowMode !== "err") doneCount++;
    refreshStat();
    refreshQuestion();
}

// 清空全部本地记录（错题+斩题+答对次数）
document.getElementById("clearErr").onclick = () => {
    localStorage.removeItem(KEY_ERR_LIST);
    localStorage.removeItem(KEY_PASS_LIST);
    localStorage.removeItem(KEY_CORRECT_COUNT);
    doneCount = 0;
    historyStack = [];
    refreshStat();
    alert("✅ 所有刷题记录已清空");
    refreshQuestion();
}

// 初始化统计
refreshStat();
</script>
